version: '3.8'

services:
  web:
    build: .
    image: devendra64/django-api-cicd:latest
    container_name: django-api-cicd
    command: python manage.py runserver 0.0.0.0:1404
    volumes:
      - .:/app
    ports:
      - "1404:1404"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1


